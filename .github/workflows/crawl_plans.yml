name: 爬取招生计划数据

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '爬取模式'
        required: true
        type: choice
        options:
          - test
          - sample
          - full
        default: test
      years:
        description: '年份范围（可选，如：2025,2024,2023 或 2021-2025）'
        required: false
        type: string
        default: ''

  schedule:
    - cron: '0 2 1 * *'

permissions:
  contents: write

concurrency:
  group: crawl-plans-${{ github.ref }}
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建数据目录
        run: |
          mkdir -p data/plans
          mkdir -p data/plans_progress
          mkdir -p data/plans_progress/completed

      - name: 检查学校目录
        shell: bash
        run: |
          test -f data/schools.json || (echo "缺少 data/schools.json，请先更新学校数据" && exit 1)
          echo "检测到学校索引文件: data/schools.json"


      - name: 执行 plans 爬取
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_YEARS: ${{ github.event.inputs.years }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "schedule" ]; then
            MODE="full"
            RAW_YEARS="${INPUT_YEARS:-}"
          else
            MODE="${INPUT_MODE:-test}"
            RAW_YEARS="${INPUT_YEARS:-}"
          fi

          mapfile -t YEAR_LIST < <(bash scripts/resolve_years.sh "$RAW_YEARS" "$MODE")

          if [ "${#YEAR_LIST[@]}" -eq 0 ]; then
            echo "没有可执行年份"
            exit 1
          fi

          case "$MODE" in
            test)
              SAMPLE_SCHOOLS_VALUE=3
              MAX_SCHOOLS_PER_RUN=1
              ;;
            sample)
              SAMPLE_SCHOOLS_VALUE=10
              MAX_SCHOOLS_PER_RUN=3
              ;;
            full)
              SAMPLE_SCHOOLS_VALUE=99999
              MAX_SCHOOLS_PER_RUN=20
              ;;
            *)
              echo "未知模式: $MODE"
              exit 1
              ;;
          esac

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for year in "${YEAR_LIST[@]}"; do
            PROGRESS_FILE="data/plans_progress/${year}.json"
            LOOP_COUNT=0
            MAX_LOOPS=500

            while true; do
              LOOP_COUNT=$((LOOP_COUNT + 1))
              if [ "$LOOP_COUNT" -gt "$MAX_LOOPS" ]; then
                echo "年份 ${year} 循环次数过多，停止本次运行"
                exit 1
              fi

              export DB_ENABLED=false
              export CRAWL_MODE="$MODE"
              export SAMPLE_SCHOOLS="$SAMPLE_SCHOOLS_VALUE"
              export PLAN_YEARS="$year"
              export PLAN_PROGRESS_FILE="$PROGRESS_FILE"
              export PLAN_PROGRESS_DIR="data/plans_progress"
              export PLAN_COMPLETED_DIR="data/plans_progress/completed"
              export PLAN_DATA_DIR="data/plans"
              export SCHOOL_DATA_FILE="data/schools.json"
              export PLAN_SKIP_EXISTING=true
              export PLAN_DEBUG=false
              export PLAN_MAX_SCHOOLS_PER_RUN="$MAX_SCHOOLS_PER_RUN"
              export PLAN_PROVINCE_WORKERS=4
              export PLAN_SCHOOL_SLEEP_MIN=0.3
              export PLAN_SCHOOL_SLEEP_MAX=0.8

              echo "开始爬取 plans 年份: $year，第 ${LOOP_COUNT} 轮"
              python -m crawlers.plans "$year" "$MODE"

              git add -A data/plans data/plans_progress

              if ! git diff --cached --quiet; then
                if [ -f "$PROGRESS_FILE" ]; then
                  git commit -m "⏸️ 保存招生计划进度 [$year] [$MODE] #${{ github.run_number }}.${LOOP_COUNT}"
                else
                  git commit -m "📊 更新招生计划数据目录 [$year] [$MODE] #${{ github.run_number }}.${LOOP_COUNT}"
                fi
                git pull --rebase origin "${GITHUB_REF_NAME}"
                git push origin "HEAD:${GITHUB_REF_NAME}"
              else
                echo "本轮没有文件变化"
              fi

              if [ ! -f "$PROGRESS_FILE" ]; then
                echo "年份 ${year} 已完成"
                break
              fi

              echo "年份 ${year} 尚未完成，已提交本轮结果，继续下一轮"
              sleep 15
            done
          done
