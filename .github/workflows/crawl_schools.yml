name: 爬取学校数据

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '爬取模式'
        required: true
        type: choice
        options:
          - 'test'
          - 'full'
        default: 'test'

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建数据目录
        run: mkdir -p data

      - name: 爬取学校数据
        env:
          CRAWL_MODE: ${{ github.event.inputs.mode }}
          FETCH_COMPLETE_INFO: 'true'
        run: python -m crawlers.schools "${{ github.event.inputs.mode }}"

      - name: 配置 Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: 提交变更
        run: |
          git add data/schools.json
          if git diff --cached --quiet; then
            echo "没有变化，跳过提交"
            exit 0
          fi
          git commit -m "🏫 更新学校数据 [${{ github.event.inputs.mode }}] #${{ github.run_number }}"

      - name: 同步远端并推送
        run: |
          git pull --rebase origin main
          git push origin HEAD:main
